<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English | Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- navbar -->
    <header class="">
      <div class="navbar bg-base-200 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <button class="">
                  <i class="fa-regular fa-circle-question"></i> FAQ
                </button>
              </li>
              <li>
                <button class="">
                  <i class="fa-solid fa-book-open"></i> Learn
                </button>
              </li>
              <li>
                <button class="">
                  <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </button>
              </li>
            </ul>
          </div>

          <div class="flex space-x-0.5 items-center">
            <span class="text-xl font-bold">English</span
            ><img src="./assets/logo.png" alt="" /><span
              class="bangla text-xl font-medium"
              >জানালা</span
            >
          </div>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-2">
            <li>
              <button class="btn btn-outline btn-primary">
                <i class="fa-regular fa-circle-question"></i> FAQ
              </button>
            </li>
            <li>
              <button class="btn btn-outline btn-primary">
                <i class="fa-solid fa-book-open"></i> Learn
              </button>
            </li>
            <li>
              <button class="btn btn-outline btn-primary">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- Banner section -->
    <section
      class="my-2 flex flex-col-reverse text-center md:text-left md:flex-row md:justify-between items-center container mx-auto"
    >
      <div class="text space-y-4 flex-1">
        <h1 class="text-5xl font-bold">
          <span class="text-[#00BCFF]">English</span
          ><span class="text-[#18181B]">is Easy!!</span>
        </h1>
        <p class="bangla text-[1.1rem] font-medium leading-8">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ
        </p>
        <form action="" class="space-y-4">
          <div>
            <input
              type="text"
              name=""
              class="border border-[gray] px-3 py-1.5 rounded-sm"
              placeholder="Enter Your Name"
              id=""
            />
          </div>
          <div>
            <input
              type="password"
              name=""
              class="border border-[gray] px-3 py-1.5 rounded-sm"
              placeholder="password"
              id=""
            />
          </div>
          <div><button class="btn btn-primary">Get Start</button></div>
        </form>
      </div>
      <div class="img flex-1">
        <img src="./assets/hero-student.png" class="align-middle" alt="" />
      </div>
    </section>

    <!-- card section -->
    <section class="my-15 space-y-7">
      <h2 class="text-5xl font-bold text-center">
        <span class="text-[#00BCFF]">Let's</span
        ><span class="text-[#18181B]"> Learn Vocabularies</span>
      </h2>
      <!-- btn container -->
      <div
        id="level-container"
        class="flex justify-center gap-3 flex-wrap"
      ></div>
      <!-- word card container -->
      <div
        id="card-container"
        class="bg-gray-100 py-10 px-5 rounded-lg container mx-auto grid grid-cols-3 gap-2.5"
      >
        <!-- default -->
        <!-- <div class="text-center col-span-full bangla space-y-4">
          <p class="text-[#79716B]">আপনি এখনো কোন Lesson Select করেন নি</p>
          <h3 class="font-bold text-4xl text-[#292524]">
            একটি Lesson Select করুন।
          </h3>
        </div> -->
      </div>
    </section>

    <script src="./js/script.js"></script>
  </body>
</html>
